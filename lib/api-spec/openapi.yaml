openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BudgetBite API — AI-powered nutrition and grocery planning
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile management
  - name: groceries
    description: AI grocery planner
  - name: mealplan
    description: AI meal planner
  - name: recipes
    description: Recipe details
  - name: budget
    description: Budget tracking
  - name: dashboard
    description: Dashboard and analytics
  - name: admin
    description: Admin panel

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Profile ──────────────────────────────────────────────────
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Profile not found
    put:
      operationId: upsertProfile
      tags: [profile]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ── Grocery Planner ──────────────────────────────────────────
  /groceries:
    get:
      operationId: getGroceryPlan
      tags: [groceries]
      summary: Get the current grocery plan for the user
      responses:
        "200":
          description: Grocery plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryPlan"
        "404":
          description: No grocery plan yet

  /groceries/generate:
    post:
      operationId: generateGroceryPlan
      tags: [groceries]
      summary: Generate AI grocery plan based on user profile
      responses:
        "200":
          description: Generated grocery plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryPlan"

  # ── Meal Planner ─────────────────────────────────────────────
  /mealplan:
    get:
      operationId: getMealPlan
      tags: [mealplan]
      summary: Get the 30-day meal plan for the user
      responses:
        "200":
          description: Meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"
        "404":
          description: No meal plan yet

  /mealplan/generate:
    post:
      operationId: generateMealPlan
      tags: [mealplan]
      summary: Generate AI 30-day meal plan based on user profile
      responses:
        "200":
          description: Generated meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"

  /mealplan/today:
    get:
      operationId: getTodayMeals
      tags: [mealplan]
      summary: Get today's meals from the 30-day plan
      responses:
        "200":
          description: Today's meals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayMeal"

  # ── Recipes ──────────────────────────────────────────────────
  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all recipes
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"

  /recipes/{id}:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get a recipe by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Recipe not found

  # ── Budget ───────────────────────────────────────────────────
  /budget:
    get:
      operationId: getBudget
      tags: [budget]
      summary: Get budget summary for current month
      responses:
        "200":
          description: Budget summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetSummary"

  /budget/expenses:
    get:
      operationId: listExpenses
      tags: [budget]
      summary: List grocery expenses
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: addExpense
      tags: [budget]
      summary: Add a grocery expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /budget/expenses/{id}:
    delete:
      operationId: deleteExpense
      tags: [budget]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Dashboard ────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/analytics:
    get:
      operationId: getAnalytics
      tags: [dashboard]
      summary: Get weekly nutrition and expense analytics data
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"

  # ── Admin ────────────────────────────────────────────────────
  /admin/food-items:
    get:
      operationId: listFoodItems
      tags: [admin]
      summary: List all food items
      responses:
        "200":
          description: Food items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodItem"
    post:
      operationId: createFoodItem
      tags: [admin]
      summary: Create a new food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodItem"

  /admin/food-items/{id}:
    put:
      operationId: updateFoodItem
      tags: [admin]
      summary: Update a food item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodItemInput"
      responses:
        "200":
          description: Updated food item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodItem"
    delete:
      operationId: deleteFoodItem
      tags: [admin]
      summary: Delete a food item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Profile ───────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, clerkUserId, age, gender, height, weight, activityLevel, goal, dietPreference, monthlyBudget, city, createdAt]
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        age:
          type: integer
        gender:
          type: string
        height:
          type: number
        weight:
          type: number
        activityLevel:
          type: string
        goal:
          type: string
        dietPreference:
          type: string
        foodAllergies:
          type: ["string", "null"]
        monthlyBudget:
          type: number
        city:
          type: string
        createdAt:
          type: string

    UserProfileInput:
      type: object
      required: [age, gender, height, weight, activityLevel, goal, dietPreference, monthlyBudget, city]
      properties:
        age:
          type: integer
        gender:
          type: string
        height:
          type: number
        weight:
          type: number
        activityLevel:
          type: string
        goal:
          type: string
        dietPreference:
          type: string
        foodAllergies:
          type: ["string", "null"]
        monthlyBudget:
          type: number
        city:
          type: string

    # ── Grocery ───────────────────────────────────────────
    GroceryItem:
      type: object
      required: [name, quantity, unit, estimatedCost, category]
      properties:
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string
        estimatedCost:
          type: number
        category:
          type: string

    GroceryPlan:
      type: object
      required: [id, clerkUserId, items, totalCost, remainingBudget, generatedAt]
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroceryItem"
        totalCost:
          type: number
        remainingBudget:
          type: number
        generatedAt:
          type: string

    # ── Meal Plan ─────────────────────────────────────────
    MealDetail:
      type: object
      required: [name, calories, protein, carbs, fat, cookingTime, recipeId]
      properties:
        name:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        cookingTime:
          type: integer
        recipeId:
          type: ["integer", "null"]

    DayMeal:
      type: object
      required: [day, date, breakfast, lunch, dinner, snacks, totalCalories, totalProtein, totalCarbs, totalFat]
      properties:
        day:
          type: integer
        date:
          type: string
        breakfast:
          $ref: "#/components/schemas/MealDetail"
        lunch:
          $ref: "#/components/schemas/MealDetail"
        dinner:
          $ref: "#/components/schemas/MealDetail"
        snacks:
          type: array
          items:
            $ref: "#/components/schemas/MealDetail"
        totalCalories:
          type: integer
        totalProtein:
          type: number
        totalCarbs:
          type: number
        totalFat:
          type: number

    MealPlan:
      type: object
      required: [id, clerkUserId, days, generatedAt]
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        days:
          type: array
          items:
            $ref: "#/components/schemas/DayMeal"
        generatedAt:
          type: string

    # ── Recipe ────────────────────────────────────────────
    Recipe:
      type: object
      required: [id, name, ingredients, steps, cookingTime, calories, protein, carbs, fat, dietType]
      properties:
        id:
          type: integer
        name:
          type: string
        ingredients:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            type: string
        cookingTime:
          type: integer
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        dietType:
          type: string
        imageUrl:
          type: ["string", "null"]

    # ── Budget ────────────────────────────────────────────
    BudgetSummary:
      type: object
      required: [monthlyBudget, totalSpent, remaining, percentUsed]
      properties:
        monthlyBudget:
          type: number
        totalSpent:
          type: number
        remaining:
          type: number
        percentUsed:
          type: number

    Expense:
      type: object
      required: [id, clerkUserId, amount, description, date, createdAt]
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        amount:
          type: number
        description:
          type: string
        date:
          type: string
        category:
          type: ["string", "null"]
        createdAt:
          type: string

    ExpenseInput:
      type: object
      required: [amount, description, date]
      properties:
        amount:
          type: number
        description:
          type: string
        date:
          type: string
        category:
          type: ["string", "null"]

    # ── Dashboard ─────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [todayCalories, todayProtein, monthlyBudget, budgetSpent, budgetRemaining, groceryItemsCount, mealPlanGenerated, groceryPlanGenerated]
      properties:
        todayCalories:
          type: integer
        todayProtein:
          type: number
        monthlyBudget:
          type: number
        budgetSpent:
          type: number
        budgetRemaining:
          type: number
        groceryItemsCount:
          type: integer
        mealPlanGenerated:
          type: boolean
        groceryPlanGenerated:
          type: boolean

    WeeklyNutrition:
      type: object
      required: [day, calories, protein, carbs, fat]
      properties:
        day:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number

    WeeklyExpense:
      type: object
      required: [week, amount]
      properties:
        week:
          type: string
        amount:
          type: number

    Analytics:
      type: object
      required: [weeklyNutrition, weeklyExpenses]
      properties:
        weeklyNutrition:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyNutrition"
        weeklyExpenses:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyExpense"

    # ── Admin ─────────────────────────────────────────────
    FoodItem:
      type: object
      required: [id, name, category, pricePerUnit, unit, calories, protein, carbs, fat]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        pricePerUnit:
          type: number
        unit:
          type: string
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        dietType:
          type: string

    FoodItemInput:
      type: object
      required: [name, category, pricePerUnit, unit, calories, protein, carbs, fat]
      properties:
        name:
          type: string
        category:
          type: string
        pricePerUnit:
          type: number
        unit:
          type: string
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        dietType:
          type: string
