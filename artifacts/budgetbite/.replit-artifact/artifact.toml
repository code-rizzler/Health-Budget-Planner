kind = "web"
previewPath = "/"
title = "BudgetBite"
version = "1.0.0"
id = "artifacts/budgetbite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25755

[services.development]
run = "pnpm --filter @workspace/budgetbite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/budgetbite", "run", "build" ]
publicDir = "artifacts/budgetbite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25755"
BASE_PATH = "/"
